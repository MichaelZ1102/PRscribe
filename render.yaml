services:
  - type: web
    name: prscribe
    runtime: node
    repo: https://github.com/MichaelZ1102/PRscribe
    branch: main
    buildCommand: pnpm install && pnpm build
    startCommand: node dist/index.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: PORT
        value: "3000"
      - key: NODE_ENV
        value: production
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_PRIVATE_KEY
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://opencode.ai/zen/go/v1
      - key: LLM_MODEL
        value: deepseek-v4-flash
      - key: REDIS_URL
        sync: false

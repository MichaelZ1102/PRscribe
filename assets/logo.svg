<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <rect x="4" y="4" width="112" height="112" rx="24" ry="24" fill="url(#bg)"/>

  <!-- PR letters -->
  <text x="60" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="white" text-anchor="middle" letter-spacing="1">PR</text>

  <!-- Underline accent -->
  <rect x="34" y="60" width="52" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- scribe text -->
  <text x="60" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#c4b5fd" text-anchor="middle" letter-spacing="2.5">SCRIBE</text>

  <!-- AI badge -->
  <rect x="44" y="88" width="32" height="14" rx="7" fill="url(#accent)" opacity="0.9"/>
  <text x="60" y="99" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#0f172a" text-anchor="middle" letter-spacing="2">AI</text>
</svg>

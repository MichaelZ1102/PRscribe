app = "prscribe"
primary_region = "hkg"
kill_signal = "SIGTERM"

[build]
  builder = "heroku/buildpacks:20"
  buildpacks = ["https://github.com/heroku/heroku-buildpack-nodejs"]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[env]
  NODE_ENV = "production"
  PORT = "3000"
